<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el Número</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="game-box">
            <div class="header">
                <h2>ADIVINA EL NÚMERO</h2>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <label>Numero:</label>
                    <input type="number" id="numeroInput" min="1" max="100">
                </div>
                <button onclick="jugar()">Jugar</button>
                <div class="mensaje-box" id="mensajeBox"></div>
            </div>

            <div class="intentos-texto" id="intentosTexto">
                INTENTOS REALIZADOS
            </div>


            <div class="grid">
                <div class="celda" data-num="1">
                    <div class="numero">1</div>
                    <div class="marca">X</div>
                </div>
                <div class="celda" data-num="2">
                    <div class="numero">2</div>
                    <div class="marca">X</div>
                </div>
                <div class="celda" data-num="3">
                    <div class="numero">3</div>
                    <div class="marca">X</div>
                </div>
                <div class="celda" data-num="4">
                    <div class="numero">4</div>
                    <div class="marca">X</div>
                </div>
                <div class="celda" data-num="5">
                    <div class="numero">5</div>
                    <div class="marca">X</div>
                </div>
                <div class="celda" data-num="6">
                    <div class="numero">6</div>
                    <div class="marca">X</div>
                </div>
                <div class="celda" data-num="7">
                    <div class="numero">7</div>
                    <div class="marca">X</div>
                </div>
                <div class="celda" data-num="8">
                    <div class="numero">8</div>
                    <div class="marca">X</div>
                </div>
                <div class="celda" data-num="9">
                    <div class="numero">9</div>
                    <div class="marca">X</div>
                </div>
                <div class="celda" data-num="10">
                    <div class="numero">10</div>
                    <div class="marca">X</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
